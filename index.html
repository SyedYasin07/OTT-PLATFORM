<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Netflix Intro</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
}

.netflix-intro{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    cursor:pointer;
}

.logo-container{
    display:flex;
    gap:8px;
}

.letter{
    font-size:5rem;
    font-weight:bold;
    color:red;
    opacity:0;
    transform:scale(0.8);
    animation:fadeIn 1s ease forwards;
}

.letter:nth-child(1){ animation-delay:0.2s; }
.letter:nth-child(2){ animation-delay:0.4s; }
.letter:nth-child(3){ animation-delay:0.6s; }
.letter:nth-child(4){ animation-delay:0.8s; }
.letter:nth-child(5){ animation-delay:1s; }
.letter:nth-child(6){ animation-delay:1.2s; }
.letter:nth-child(7){ animation-delay:1.4s; }

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(0.6);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

</style>
</head>

<body>

<div class="netflix-intro" id="intro">

    <div class="logo-container">

        <span class="letter">N</span>
        <span class="letter">E</span>
        <span class="letter">T</span>
        <span class="letter">F</span>
        <span class="letter">L</span>
        <span class="letter">I</span>
        <span class="letter">X</span>

    </div>

</div>

<audio id="sound">
    <source src="./net.mp3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("sound");

console.log(audio);

audio.addEventListener("error", () => {
    document.getElementById("test").innerHTML = "Audio failed to load";
});

audio.addEventListener("canplay", () => {
    document.getElementById("test").innerHTML = "Audio loaded successfully";
});

document.body.addEventListener("click", () => {
    audio.play();
});

</script>

</body>
</html>
